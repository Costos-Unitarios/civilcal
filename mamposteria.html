<div class="contenedor">

<h2>Calculadora de Muro de Mampostería</h2>

<input id="largo" type="number" placeholder="Longitud muro (m)">

<br>

<input id="alto" type="number" placeholder="Altura muro (m)">

<br>

<input id="espesor" type="number" placeholder="Espesor muro (m)">

<br><br>

<button onclick="calcular()">Calcular</button>

<p id="resultado"></p>

</div>

<script>

function calcular(){

let largo=parseFloat(document.getElementById("largo").value);

let alto=parseFloat(document.getElementById("alto").value);

let espesor=parseFloat(document.getElementById("espesor").value);

let volumen=largo*alto*espesor;

let piedra=volumen*0.70;

let mortero=volumen*0.30;

let cemento=mortero*7.5;

let arena=mortero*1.05;

let agua=mortero*0.21;

document.getElementById("resultado").innerHTML=

"Volumen del muro: "+volumen.toFixed(2)+" m³<br><br>"+

"Piedra: "+piedra.toFixed(2)+" m³<br>"+

"Mortero: "+mortero.toFixed(2)+" m³<br><br>"+

"Cemento: "+Math.ceil(cemento)+" sacos<br>"+

"Arena: "+arena.toFixed(2)+" m³<br>"+

"Agua: "+agua.toFixed(2)+" m³";

}

</script>
