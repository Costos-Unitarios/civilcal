<div class="contenedor">

<h2>Calculadora de Pintura</h2>

<input id="largo" type="number" placeholder="Largo del muro (m)">

<br>

<input id="alto" type="number" placeholder="Altura del muro (m)">

<br>

<input id="manos" type="number" placeholder="Número de manos">

<br>

<input id="rendimiento" type="number" placeholder="Rendimiento m² por galón (ej 35)">

<br><br>

<button onclick="calcular()">Calcular</button>

<p id="resultado"></p>

</div>

<script>

function calcular(){

let largo=parseFloat(document.getElementById("largo").value);

let alto=parseFloat(document.getElementById("alto").value);

let manos=parseFloat(document.getElementById("manos").value);

let rendimiento=parseFloat(document.getElementById("rendimiento").value);

let area=largo*alto;

let areaTotal=area*manos;

let galones=areaTotal/rendimiento;

document.getElementById("resultado").innerHTML=

"Área del muro: "+area.toFixed(2)+" m²<br><br>"+

"Área total a pintar: "+areaTotal.toFixed(2)+" m²<br><br>"+

"Galones necesarios: "+galones.toFixed(2);

}

</script>
