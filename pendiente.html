<div class="contenedor">

<h2>Calculadora de Pendiente</h2>

<input id="altura" placeholder="Diferencia de nivel (m)">

<br>

<input id="distancia" placeholder="Distancia horizontal (m)">

<br><br>

<button onclick="calcular()">Calcular</button>

<p id="resultado"></p>

</div>

<script>

function calcular(){

let h=parseFloat(document.getElementById("altura").value);
let d=parseFloat(document.getElementById("distancia").value);

let pendiente=(h/d)*100;

document.getElementById("resultado").innerHTML=

"Pendiente: "+pendiente.toFixed(2)+" %";

}

</script>
