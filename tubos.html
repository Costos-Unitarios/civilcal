<div class="contenedor">

<h2>Calculadora de Tubos</h2>

<input id="diametro" type="number" placeholder="Diámetro del tubo (m)">

<br>

<input id="longitud" type="number" placeholder="Longitud del tubo (m)">

<br><br>

<button onclick="calcular()">Calcular</button>

<p id="resultado"></p>

</div>

<script>

function calcular(){

let D=parseFloat(document.getElementById("diametro").value);

let L=parseFloat(document.getElementById("longitud").value);

let areaInterna=(Math.PI*D*D)/4;

let areaSuperficie=Math.PI*D*L;

let volumen=areaInterna*L;

document.getElementById("resultado").innerHTML=

"Área interna: "+areaInterna.toFixed(3)+" m²<br><br>"+

"Área superficial: "+areaSuperficie.toFixed(3)+" m²<br><br>"+

"Volumen interno: "+volumen.toFixed(3)+" m³";

}

</script>
