<div class="contenedor">

<h2>Calculadora de Suelo Cemento</h2>

<input id="largo" type="number" placeholder="Largo (m)">

<br>

<input id="ancho" type="number" placeholder="Ancho (m)">

<br>

<input id="espesor" type="number" placeholder="Espesor (m)">

<br><br>

<button onclick="calcular()">Calcular</button>

<p id="resultado"></p>

</div>

<script>

function calcular(){

let largo=parseFloat(document.getElementById("largo").value);

let ancho=parseFloat(document.getElementById("ancho").value);

let espesor=parseFloat(document.getElementById("espesor").value);

let volumen=largo*ancho*espesor;

let cemento=volumen*6;

let agua=volumen*120;

document.getElementById("resultado").innerHTML=

"Volumen suelo: "+volumen.toFixed(2)+" m³<br><br>"+

"Cemento: "+Math.ceil(cemento)+" sacos<br>"+

"Agua: "+agua.toFixed(0)+" litros";

}

</script>
