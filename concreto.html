<div class="contenedor">

<h2>Calculadora de Concreto</h2>

<input id="largo" type="number" placeholder="Largo (m)">

<input id="ancho" type="number" placeholder="Ancho (m)">

<input id="espesor" type="number" placeholder="Espesor (m)">

<br>

<select id="fc">

<option value="140">f'c 140 kg/cm²</option>
<option value="180">f'c 180 kg/cm²</option>
<option value="210">f'c 210 kg/cm²</option>
<option value="250">f'c 250 kg/cm²</option>
<option value="280">f'c 280 kg/cm²</option>

</select>

<br><br>

<button onclick="calcular()">Calcular</button>

<p id="resultado"></p>
</div>

<script>

function calcular(){

let largo=parseFloat(document.getElementById("largo").value);

let ancho=parseFloat(document.getElementById("ancho").value);

let espesor=parseFloat(document.getElementById("espesor").value);

let fc=document.getElementById("fc").value;

let volumen=largo*ancho*espesor;

let cemento,arena,grava;

if(fc==140){

cemento=6;
arena=0.56;
grava=0.84;

}

if(fc==180){

cemento=7;
arena=0.54;
grava=0.82;

}

if(fc==210){

cemento=8;
arena=0.50;
grava=0.78;

}

if(fc==250){

cemento=9;
arena=0.47;
grava=0.74;

}

if(fc==280){

cemento=10;
arena=0.44;
grava=0.70;

}

let totalCemento=cemento*volumen;

let totalArena=arena*volumen;

let totalGrava=grava*volumen;

document.getElementById("resultado").innerHTML=

"Volumen de concreto: "+volumen.toFixed(2)+" m³<br><br>"+

"Cemento: "+Math.ceil(totalCemento)+" sacos<br><br>"+

"Arena: "+totalArena.toFixed(2)+" m³<br><br>"+

"Grava: "+totalGrava.toFixed(2)+" m³";

}

</script>
