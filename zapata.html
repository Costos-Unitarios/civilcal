<div class="contenedor">

<h2>Calculadora de Zapata</h2>

<input id="largo" placeholder="Largo zapata (m)">
<br>

<input id="ancho" placeholder="Ancho zapata (m)">
<br>

<input id="espesor" placeholder="Espesor (m)">
<br><br>

<button onclick="calcular()">Calcular</button>

<p id="resultado"></p>

</div>

<script>

function calcular(){

let l=parseFloat(document.getElementById("largo").value);
let a=parseFloat(document.getElementById("ancho").value);
let e=parseFloat(document.getElementById("espesor").value);

let volumen=l*a*e;

let cemento=volumen*7;

document.getElementById("resultado").innerHTML=

"Volumen concreto: "+volumen.toFixed(2)+" m³<br><br>"+

"Cemento estimado: "+cemento.toFixed(1)+" sacos";

}

</script>

</body>
