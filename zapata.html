<div class="contenedor">

<h2>Calculadora de Zapatas</h2>

<input id="largo" type="number" placeholder="Largo zapata (m)">

<br>

<input id="ancho" type="number" placeholder="Ancho zapata (m)">

<br>

<input id="espesor" type="number" placeholder="Espesor (m)">

<br>

<input id="cantidad" type="number" placeholder="Cantidad de zapatas">

<br><br>

<button onclick="calcular()">Calcular</button>

<p id="resultado"></p>

</div>

<script>

function calcular(){

let largo=parseFloat(document.getElementById("largo").value);

let ancho=parseFloat(document.getElementById("ancho").value);

let espesor=parseFloat(document.getElementById("espesor").value);

let cantidad=parseFloat(document.getElementById("cantidad").value);

let volumen=largo*ancho*espesor;

let volumenTotal=volumen*cantidad;

let cemento=volumenTotal*7;

let arena=volumenTotal*0.5;

let grava=volumenTotal*0.7;

document.getElementById("resultado").innerHTML=

"Volumen por zapata: "+volumen.toFixed(2)+" m³<br><br>"+

"Volumen total: "+volumenTotal.toFixed(2)+" m³<br><br>"+

"Cemento: "+Math.ceil(cemento)+" sacos<br>"+

"Arena: "+arena.toFixed(2)+" m³<br>"+

"Grava: "+grava.toFixed(2)+" m³";

}

</script>
