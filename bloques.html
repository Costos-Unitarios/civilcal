<div class="contenedor">

<h2>Calculadora de Muro de Bloques</h2>

<input id="largo" type="number" placeholder="Longitud muro (m)">

<br>

<input id="alto" type="number" placeholder="Altura muro (m)">

<br><br>

<button onclick="calcular()">Calcular</button>

<p id="resultado"></p>

</div>

<script>

function calcular(){

let largo=parseFloat(document.getElementById("largo").value);

let alto=parseFloat(document.getElementById("alto").value);

let area=largo*alto;

let bloques=area*12.5;

let mitades=bloques*0.20;

let enteros=bloques-mitades;

let cemento=bloques/50;

let arena=cemento*0.29;

let agua=cemento*0.048;

document.getElementById("resultado").innerHTML=

"Área: "+area.toFixed(2)+" m²<br><br>"+

"Cantidad de bloques: "+bloques.toFixed(0)+" U/m²<br><br>"+

"Mitades: "+Math.ceil(mitades)+" U<br>"+

"Enteros: "+Math.ceil(enteros)+" U<br><br>"+

"Cemento: "+Math.ceil(cemento)+" bolsas<br>"+

"Arena: "+arena.toFixed(2)+" m³<br>"+

"Agua: "+agua.toFixed(2)+" m³";

}

</script>
