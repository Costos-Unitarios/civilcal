<div class="contenedor">

<h2>Calculadora de Excavación</h2>

<input id="largo" placeholder="Largo (m)">

<br>

<input id="ancho" placeholder="Ancho (m)">

<br>

<input id="prof" placeholder="Profundidad (m)">

<br><br>

<button onclick="calcular()">Calcular</button>

<p id="resultado"></p>

</div>

<script>

function calcular(){

let l=parseFloat(document.getElementById("largo").value);
let a=parseFloat(document.getElementById("ancho").value);
let h=parseFloat(document.getElementById("prof").value);

let volumen=l*a*h;

let camiones=volumen/5;

document.getElementById("resultado").innerHTML=

"Volumen excavación: "+volumen.toFixed(2)+" m³<br><br>"+

"Viajes camión (5 m³): "+camiones.toFixed(1);

}

</script>
