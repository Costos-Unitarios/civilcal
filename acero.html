<div class="contenedor">

<h2>Calculadora de Acero</h2>

<input id="largo" type="number" placeholder="Largo (m)">

<br>

<input id="ancho" type="number" placeholder="Ancho (m)">

<br>

<input id="separacion" type="number" placeholder="Separación acero (m)">

<br><br>

<button onclick="calcular()">Calcular</button>

<p id="resultado"></p>

</div>

<script>

function calcular(){

let largo=parseFloat(document.getElementById("largo").value);

let ancho=parseFloat(document.getElementById("ancho").value);

let sep=parseFloat(document.getElementById("separacion").value);

let varillasX=(ancho/sep)+1;

let varillasY=(largo/sep)+1;

let total=Math.ceil(varillasX)+Math.ceil(varillasY);

let varillas6m=(total*largo)/6;

document.getElementById("resultado").innerHTML=

"Varillas dirección X: "+Math.ceil(varillasX)+"<br>"+

"Varillas dirección Y: "+Math.ceil(varillasY)+"<br><br>"+



"Varillas en presentacion de (6m): "+Math.ceil(varillas6m);


}

</script>
