<div class="contenedor">

<h2>Calculadora de Juntas</h2>

<input id="largo" type="number" placeholder="Largo (m)">

<input id="ancho" type="number" placeholder="Ancho (m)">

<input id="separacion" type="number" placeholder="Separación de juntas (m)">

<button onclick="calcular()">Calcular</button>

<p id="resultado"></p>

</div>

<script>

function calcular(){

let largo=parseFloat(document.getElementById("largo").value);

let ancho=parseFloat(document.getElementById("ancho").value);

let separacion=parseFloat(document.getElementById("separacion").value);

let juntasLargo=Math.floor(largo/separacion);

let juntasAncho=Math.floor(ancho/separacion);

let paneles=(juntasLargo+1)*(juntasAncho+1);

document.getElementById("resultado").innerHTML=

"Juntas longitudinales: "+juntasLargo+"<br><br>"+

"Juntas transversales: "+juntasAncho+"<br><br>"+

"Total de paneles: "+paneles;

}

</script>
