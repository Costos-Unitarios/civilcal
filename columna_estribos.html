<div class="contenedor">

<h2>Calculadora de Columna</h2>

<input id="altura" type="number" placeholder="Altura columna (m)">

<input id="ancho" type="number" placeholder="Ancho columna (m)">

<input id="largo" type="number" placeholder="Largo columna (m)">

<input id="separacion" type="number" placeholder="Separación estribos (m)">

<input id="varillasLong" type="number" placeholder="Cantidad varillas longitudinales">

<button onclick="calcular()">Calcular</button>

<p id="resultado"></p>
</div>

<script>

function calcular(){

let altura=parseFloat(document.getElementById("altura").value);

let ancho=parseFloat(document.getElementById("ancho").value);

let largo=parseFloat(document.getElementById("largo").value);

let separacion=parseFloat(document.getElementById("separacion").value);

let varillasLong=parseFloat(document.getElementById("varillasLong").value);

/* estribos */

let cantidadEstribos=Math.ceil(altura/separacion);

let perimetro=2*(ancho+largo);

let longitudEstribos=perimetro*cantidadEstribos;

let varillasEstribos=Math.ceil(longitudEstribos/6);

/* longitudinal */

let longitudLong=altura*varillasLong;

let varillasLongitudinal=Math.ceil(longitudLong/6);

document.getElementById("resultado").innerHTML=

"Estribos necesarios: "+cantidadEstribos+"<br><br>"+

"Longitud total estribos: "+longitudEstribos.toFixed(2)+" m<br><br>"+

"Varillas para estribos (6m): "+varillasEstribos+"<br><br>"+

"Longitud acero longitudinal: "+longitudLong.toFixed(2)+" m<br><br>"+

"Varillas longitudinales (6m): "+varillasLongitudinal;

}

</script>
