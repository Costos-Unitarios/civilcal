<div class="contenedor">

<h2>Calculadora de Columnas</h2>

<input id="altura" type="number" placeholder="Altura columna (m)">

<br>

<input id="separacion" type="number" placeholder="Separación estribos (m)">

<br>

<input id="ancho" type="number" placeholder="Ancho columna (m)">

<br>

<input id="largo" type="number" placeholder="Largo columna (m)">

<br>

<input id="varillas" type="number" placeholder="Número de varillas longitudinales">

<br><br>

<button onclick="calcular()">Calcular</button>

<p id="resultado"></p>

</div>

<script>

function calcular(){

let h=parseFloat(document.getElementById("altura").value);

let sep=parseFloat(document.getElementById("separacion").value);

let ancho=parseFloat(document.getElementById("ancho").value);

let largo=parseFloat(document.getElementById("largo").value);

let barras=parseFloat(document.getElementById("varillas").value);

let estribos=(h/sep)+1;

let perimetro=(ancho+largo)*2;

let aceroEstribos=perimetro*estribos;

let aceroLong=barras*h;

let totalAcero=aceroEstribos+aceroLong;

document.getElementById("resultado").innerHTML=

"Estribos: "+Math.ceil(estribos)+"<br><br>"+

"Longitud acero estribos: "+aceroEstribos.toFixed(2)+" m<br>"+

"Longitud acero longitudinal: "+aceroLong.toFixed(2)+" m<br><br>"+

"Acero total: "+totalAcero.toFixed(2)+" m";

}

</script>
